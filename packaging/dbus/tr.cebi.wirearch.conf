<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus-1/busconfig.dtd">
<busconfig>
  <!-- Only the daemon's user (or root, for direct activation) may own the name. -->
  <policy user="wirearch">
    <allow own="tr.cebi.wirearch"/>
  </policy>
  <policy user="root">
    <allow own="tr.cebi.wirearch"/>
  </policy>

  <!-- Any local client may call the service; method-level access is gated by
       polkit inside the daemon, not by the bus. -->
  <policy context="default">
    <allow send_destination="tr.cebi.wirearch"/>
    <allow receive_sender="tr.cebi.wirearch"/>
  </policy>
</busconfig>
